<body>

<!-- ── LOGIN ─────────────────────────────────────────────────────────────── -->

<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">🛒</div>
    <h1 class="login-title">GroceryTrack</h1>
    <p class="login-sub">Track prices. Shop smarter.</p>
    <div class="feature-grid">
      <div class="feature-chip"><span>📊</span>Unit prices</div>
      <div class="feature-chip"><span>📦</span>Bulk entry</div>
      <div class="feature-chip"><span>💾</span>Saved locally</div>
      <div class="feature-chip"><span>📱</span>Mobile first</div>
    </div>
    <input class="login-name-input" id="login-input" type="text" placeholder="Enter your name to continue" autocomplete="off" />
    <button class="btn-login" onclick="doLogin()">Continue →</button>
    <p class="admin-hint">Admin? Enter <strong>admin</strong> as your name.</p>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────────────────────────── -->

<div id="app-screen">
  <div class="header">
    <div class="header-left">
      <span class="header-title">🛒 GroceryTrack</span>
      <span id="header-admin-badge" class="admin-badge" style="display:none">ADMIN</span>
      <span class="header-badge" id="header-badge">👤</span>
    </div>
    <div class="header-right">
      <span class="user-name" id="header-user"></span>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- Desktop tabs -->

  <div class="tabs" id="desktop-tabs"></div>

  <!-- Content -->

  <div class="content" id="main-content"></div>

  <!-- Mobile bottom nav -->

  <div class="bottom-nav" id="bottom-nav"></div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const ADMIN = "admin";
const DEFAULT_STORES = ["Walmart","Costco","Trader Joe's","Whole Foods","Kroger","Aldi","Target","Safeway","Publix","Other"];
const UNITS  = ["pcs","lb","kg","oz","gallon","liter","fl oz","pack","box","bag","dozen","bunch"];
const DEFAULT_ITEMS = ["Apples","Bananas","Milk","Eggs","Bread","Butter","Cheese","Chicken","Beef","Rice","Pasta","Tomatoes","Onions","Potatoes","Carrots","Spinach","Yogurt","Orange Juice","Coffee","Tea"];
const DEFAULT_CATEGORIES = ["Produce","Meat & Seafood","Dairy & Eggs","Bakery","Snacks & Beverages","Pantry & Grains","Frozen","Household","Beauty"];

// Category emoji map
const CAT_EMOJI = {
  "Produce":"🥦","Meat & Seafood":"🥩","Dairy & Eggs":"🥛","Bakery":"🍞",
  "Snacks & Beverages":"🍿","Pantry & Grains":"🌾","Frozen":"❄️","Household":"🧹","Beauty":"💄"
};

// ── State ─────────────────────────────────────────────────────────────────────
let session = null;
let currentTab = "add";
let entryMode = "single";
let bulkRows = [];

// ── Storage ───────────────────────────────────────────────────────────────────
const getEntries    = () => JSON.parse(localStorage.getItem(`gt_e_${session}`) || "[]");
const saveEntries   = (d) => localStorage.setItem(`gt_e_${session}`, JSON.stringify(d));
const getItems      = () => JSON.parse(localStorage.getItem("gt_items") || JSON.stringify(DEFAULT_ITEMS));
const saveItems     = (d) => localStorage.setItem("gt_items", JSON.stringify(d));
const getStores     = () => JSON.parse(localStorage.getItem("gt_stores") || JSON.stringify(DEFAULT_STORES));
const saveStores    = (d) => localStorage.setItem("gt_stores", JSON.stringify(d));
const getCategories = () => JSON.parse(localStorage.getItem("gt_cats") || JSON.stringify(DEFAULT_CATEGORIES));
const saveCategories= (d) => localStorage.setItem("gt_cats", JSON.stringify(d));
const getUsers      = () => JSON.parse(localStorage.getItem("gt_users") || "[]");
const saveUsers     = (d) => localStorage.setItem("gt_users", JSON.stringify(d));

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmtDate   = (d) => new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
const todayStr  = () => new Date().toISOString().split("T")[0];
const unitPrice = (p,q) => (q > 0 ? p / q : p);
const esc       = (s) => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ── Login / Logout ────────────────────────────────────────────────────────────
function doLogin() {
  const n = document.getElementById("login-input").value.trim().toLowerCase();
  if (!n) return;
  const users = getUsers();
  if (!users.includes(n)) saveUsers([...users, n]);
  session = n;
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-screen").style.display   = "flex";
  document.getElementById("header-user").textContent    = n;
  document.getElementById("header-badge").textContent   = n === ADMIN ? "🛡️" : "👤";
  if (n === ADMIN) document.getElementById("header-admin-badge").style.display = "inline";
  buildNav();
  switchTab(n === ADMIN ? "users" : "add");
}

document.getElementById("login-input").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

function doLogout() {
  session = null;
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("app-screen").style.display   = "none";
  document.getElementById("login-input").value = "";
  document.getElementById("header-admin-badge").style.display = "none";
}

// ── Navigation ────────────────────────────────────────────────────────────────
function buildNav() {
  const isAdmin = session === ADMIN;
  const tabs = isAdmin
    ? [["users","👥","Users"],["items","🏷️","Items"],["stores","🏪","Stores"],["cats","📂","Categories"],["all","📋","All"]]
    : [["add","➕","Add"],["dashboard","📊","Dashboard"],["history","📋","History"]];

  // Desktop tabs
  document.getElementById("desktop-tabs").innerHTML = tabs.map(([id,icon,label]) =>
    `<button class="tab-btn${currentTab===id?" active":""}" onclick="switchTab('${id}')">${icon} ${label}</button>`
  ).join("");

  // Mobile bottom nav
  document.getElementById("bottom-nav").innerHTML = tabs.map(([id,icon,label]) =>
    `<button class="bottom-nav-btn${currentTab===id?" active":""}" onclick="switchTab('${id}')"><span>${icon}</span><span>${label}</span></button>`
  ).join("");
}

function switchTab(tab) {
  currentTab = tab;
  buildNav();
  const content = document.getElementById("main-content");
  if (session === ADMIN) {
    if (tab === "users")   content.innerHTML = renderAdminUsers();
    if (tab === "items")   content.innerHTML = renderAdminItems();
    if (tab === "stores")  content.innerHTML = renderAdminStores();
    if (tab === "cats")    content.innerHTML = renderAdminCats();
    if (tab === "all")     content.innerHTML = renderAdminAll();
  } else {
    if (tab === "add")       content.innerHTML = renderAdd();
    if (tab === "dashboard") content.innerHTML = renderDashboard();
    if (tab === "history")   content.innerHTML = renderHistory();
  }
  // Re-init bulk rows if needed
  if (tab === "add" && entryMode === "bulk") initBulkRows();
}

// ── ADD TAB ───────────────────────────────────────────────────────────────────
function renderAdd() {
  return `
  <div class="card">
    <div class="mode-toggle">
      <button class="mode-btn${entryMode==="single"?" active":""}" onclick="setMode('single')">📝 Single Entry</button>
      <button class="mode-btn${entryMode==="bulk"?" active":""}"   onclick="setMode('bulk')">📦 Bulk Entry</button>
    </div>
    <p class="mode-hint">${entryMode==="single"?"Add one item at a time":"Add multiple items from one store"}</p>
    <div id="entry-form"></div>
  </div>`;
}

function setMode(m) {
  entryMode = m;
  document.getElementById("main-content").innerHTML = renderAdd();
  if (m === "bulk") initBulkRows();
  else renderSingleForm();
}

// ── SINGLE FORM ───────────────────────────────────────────────────────────────
function renderSingleForm() {
  document.getElementById("entry-form").innerHTML = `
    <p class="card-title">Single Transaction</p>
    <label class="field-label">Category</label>
    <select class="field-select" id="s-cat">
      <option value="">Select a category…</option>
      ${getCategories().map(c=>`<option value="${esc(c)}">${(CAT_EMOJI[c]||'🏷️')} ${esc(c)}</option>`).join("")}
    </select>
    <label class="field-label">Item Name</label>
    <div class="autocomplete-wrap">
      <input class="field-input" id="s-item" placeholder="Type or search…" autocomplete="off"
        oninput="showSug('s-item','s-sug')" onfocus="showSug('s-item','s-sug')" onblur="hideSug('s-sug')" />
      <div class="autocomplete-list" id="s-sug" style="display:none"></div>
    </div>
    <div class="qty-unit-row">
      <div>
        <label class="field-label">Quantity</label>
        <input class="field-input" id="s-qty" type="number" min="0.01" step="0.01" placeholder="e.g. 2" value="1" oninput="updatePreview()" />
      </div>
      <div>
        <label class="field-label">Unit</label>
        <select class="field-select" id="s-unit" onchange="updatePreview()">
          ${UNITS.map(u=>`<option value="${u}">${u}</option>`).join("")}
        </select>
      </div>
    </div>
    <label class="field-label">Total Price Paid ($)</label>
    <input class="field-input" id="s-price" type="number" step="0.01" min="0" placeholder="e.g. 5.99" oninput="updatePreview()" />
    <div id="unit-preview" style="display:none" class="unit-preview">Unit price: <strong id="preview-val"></strong></div>
    <label class="field-label">Store Name</label>
    <div style="display:flex;gap:8px;align-items:flex-start">
      <select class="field-select" id="s-store" style="flex:1" onchange="handleStoreChange('s-store','s-newstore-wrap')">
        <option value="">Select a store…</option>
        ${getStores().map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("")}
        <option value="__new__">＋ Add new store…</option>
      </select>
    </div>
    <div id="s-newstore-wrap" style="display:none;margin-top:8px">
      <div style="display:flex;gap:8px">
        <input class="field-input" id="s-newstore" placeholder="Enter store name…" style="flex:1" />
        <button class="btn-add-item" onclick="saveNewStore('s-store','s-newstore','s-newstore-wrap')">Save</button>
      </div>
    </div>
    <label class="field-label">Date <span>(optional — defaults to today)</span></label>
    <input class="field-input" id="s-date" type="date" />
    <button class="btn-primary" id="s-save-btn" onclick="saveSingle()">Save Transaction</button>
    <div id="s-success" style="display:none" class="success-msg">✅ Saved successfully!</div>
  `;
}

function showSug(inputId, sugId) {
  const val  = document.getElementById(inputId).value.toLowerCase();
  const items = getItems();
  const matches = val ? items.filter(i => i.toLowerCase().includes(val)) : items;
  const el = document.getElementById(sugId);
  if (!el) return;
  let html = matches.slice(0,8).map(i => `<div class="autocomplete-item" onmousedown="pickSug('${inputId}','${sugId}','${esc(i)}')">${esc(i)}</div>`).join("");
  const raw = document.getElementById(inputId).value.trim();
  if (raw && !items.includes(raw)) html += `<div class="autocomplete-item new-item" onmousedown="pickSug('${inputId}','${sugId}','${esc(raw)}')">+ Add "${esc(raw)}"</div>`;
  el.innerHTML = html;
  el.style.display = html ? "block" : "none";
}

function hideSug(sugId) {
  setTimeout(() => { const el = document.getElementById(sugId); if (el) el.style.display = "none"; }, 200);
}

function pickSug(inputId, sugId, val) {
  document.getElementById(inputId).value = val;
  hideSug(sugId);
  updatePreview();
}

function updatePreview() {
  const price = parseFloat(document.getElementById("s-price")?.value);
  const qty   = parseFloat(document.getElementById("s-qty")?.value);
  const unit  = document.getElementById("s-unit")?.value;
  const prev  = document.getElementById("unit-preview");
  const val   = document.getElementById("preview-val");
  if (prev && val && price > 0 && qty > 0) {
    val.textContent = `$${(price/qty).toFixed(2)} / ${unit}`;
    prev.style.display = "block";
  } else if (prev) {
    prev.style.display = "none";
  }
}

function saveSingle() {
  const item  = document.getElementById("s-item").value.trim();
  const cat   = document.getElementById("s-cat").value;
  const price = parseFloat(document.getElementById("s-price").value);
  const qty   = parseFloat(document.getElementById("s-qty").value);
  const unit  = document.getElementById("s-unit").value;
  const store = document.getElementById("s-store").value;
  const date  = document.getElementById("s-date").value || todayStr();
  if (!item || !price || !qty || !store || store === "__new__") return;

  const items = getItems();
  if (!items.includes(item)) saveItems([...items, item]);

  const entries = getEntries();
  entries.push({ id: Date.now(), item, cat: cat||"Uncategorized", price, qty, unit, store, date });
  saveEntries(entries);

  document.getElementById("s-cat").value   = "";
  document.getElementById("s-item").value  = "";
  document.getElementById("s-price").value = "";
  document.getElementById("s-qty").value   = "1";
  document.getElementById("s-date").value  = "";
  document.getElementById("s-store").value = "";
  document.getElementById("unit-preview").style.display = "none";

  const suc = document.getElementById("s-success");
  suc.style.display = "block";
  setTimeout(() => { if(suc) suc.style.display = "none"; }, 2500);
}

// ── BULK FORM ─────────────────────────────────────────────────────────────────
function initBulkRows() {
  bulkRows = [newBulkRow(), newBulkRow(), newBulkRow()];
  renderBulkForm();
}

function newBulkRow() {
  return { id: Date.now() + Math.random(), item:"", cat:"", price:"", qty:"1", unit:"pcs" };
}

function renderBulkForm() {
  const rowsHtml = bulkRows.map((r,i) => {
    const up = r.price && parseFloat(r.qty) > 0 ? `→ $${(parseFloat(r.price)/parseFloat(r.qty)).toFixed(2)} / ${r.unit}` : "";
    return `
    <div>
      <div class="bulk-row">
        <div style="flex:2;position:relative">
          <input class="field-input" id="br-item-${r.id}" placeholder="Item ${i+1}…" value="${esc(r.item)}" autocomplete="off"
            oninput="updateBulkRow(${r.id},'item',this.value)" onfocus="showBulkSug(${r.id})" onblur="hideBulkSug(${r.id})" />
          <div class="autocomplete-list" id="br-sug-${r.id}" style="display:none"></div>
        </div>
        <div style="flex:1.8">
          <select class="field-select" id="br-cat-${r.id}" onchange="updateBulkRow(${r.id},'cat',this.value)">
            <option value="">Category…</option>
            ${getCategories().map(c=>`<option value="${esc(c)}"${r.cat===c?" selected":""}>${(CAT_EMOJI[c]||'🏷️')} ${esc(c)}</option>`).join("")}
          </select>
        </div>
        <div style="flex:1">
          <input class="field-input" id="br-qty-${r.id}" type="number" min="0.01" step="0.01" placeholder="1" value="${esc(r.qty)}"
            oninput="updateBulkRow(${r.id},'qty',this.value)" />
        </div>
        <div style="flex:1.1">
          <select class="field-select" id="br-unit-${r.id}" onchange="updateBulkRow(${r.id},'unit',this.value)">
            ${UNITS.map(u=>`<option value="${u}"${r.unit===u?" selected":""}>${u}</option>`).join("")}
          </select>
        </div>
        <div style="flex:1.2">
          <input class="field-input" id="br-price-${r.id}" type="number" step="0.01" min="0" placeholder="0.00" value="${esc(r.price)}"
            oninput="updateBulkRow(${r.id},'price',this.value)" />
        </div>
        <button class="btn-remove-row" onclick="removeBulkRow(${r.id})" ${bulkRows.length===1?"disabled":""}>✕</button>
      </div>
      ${up ? `<div class="bulk-row-hint">${up}</div>` : ""}
    </div>`;
  }).join("");

  const valid = bulkRows.filter(r => r.item.trim() && r.price && r.qty);
  const total = valid.reduce((s,r) => s + parseFloat(r.price||0), 0);
  const summaryHtml = valid.length > 0 ? `
    <div class="bulk-summary">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="summary-badge">${valid.length}</span>
        <span style="font-size:14px;color:#374151">item${valid.length!==1?"s":""} ready</span>
      </div>
      <div style="font-weight:800;color:#14532d;font-size:17px">$${total.toFixed(2)} total</div>
    </div>` : "";

  document.getElementById("entry-form").innerHTML = `
    <p class="card-title">Bulk Transaction</p>
    <div class="bulk-top">
      <div>
        <label class="field-label">Store <span style="color:#dc2626">*</span></label>
        <select class="field-select" id="b-store" onchange="handleStoreChange('b-store','b-newstore-wrap')">
          <option value="">Select a store…</option>
          ${getStores().map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("")}
          <option value="__new__">＋ Add new store…</option>
        </select>
        <div id="b-newstore-wrap" style="display:none;margin-top:8px">
          <div style="display:flex;gap:8px">
            <input class="field-input" id="b-newstore" placeholder="Enter store name…" style="flex:1" />
            <button class="btn-add-item" onclick="saveNewStore('b-store','b-newstore','b-newstore-wrap')">Save</button>
          </div>
        </div>
      </div>
      <div>
        <label class="field-label">Date <span>(optional)</span></label>
        <input class="field-input" id="b-date" type="date" />
      </div>
    </div>
    <div class="bulk-col-header">
      <div style="flex:2">Item</div>
      <div style="flex:1.8">Category</div>
      <div style="flex:1">Qty</div>
      <div style="flex:1.1">Unit</div>
      <div style="flex:1.2">Price($)</div>
      <div style="width:36px"></div>
    </div>
    ${rowsHtml}
    <button class="btn-add-row" onclick="addBulkRow()">+ Add Another Item</button>
    ${summaryHtml}
    <button class="btn-primary" onclick="saveBulk()" ${valid.length===0?"disabled":""}>
      Save All ${valid.length>0?`(${valid.length} items · $${total.toFixed(2)})`:""}
    </button>
    <div id="b-success" style="display:none" class="success-msg"></div>
  `;
}

function updateBulkRow(id, field, value) {
  bulkRows = bulkRows.map(r => r.id === id ? { ...r, [field]: value } : r);
  if (field === "item") { showBulkSug(id); return; }
  renderBulkForm();
  // restore store/date
}

function showBulkSug(id) {
  const el  = document.getElementById(`br-sug-${id}`);
  const inp = document.getElementById(`br-item-${id}`);
  if (!el || !inp) return;
  const val   = inp.value.toLowerCase();
  const items = getItems();
  const matches = val ? items.filter(i => i.toLowerCase().includes(val)) : items;
  let html = matches.slice(0,6).map(i => `<div class="autocomplete-item" onmousedown="pickBulkSug(${id},'${esc(i)}')">${esc(i)}</div>`).join("");
  const raw = inp.value.trim();
  if (raw && !items.includes(raw)) html += `<div class="autocomplete-item new-item" onmousedown="pickBulkSug(${id},'${esc(raw)}')">+ Add "${esc(raw)}"</div>`;
  el.innerHTML = html;
  el.style.display = html ? "block" : "none";
}

function hideBulkSug(id) {
  setTimeout(() => { const el = document.getElementById(`br-sug-${id}`); if (el) el.style.display = "none"; }, 200);
}

function pickBulkSug(id, val) {
  bulkRows = bulkRows.map(r => r.id === id ? { ...r, item: val } : r);
  renderBulkForm();
}

function addBulkRow() {
  bulkRows.push(newBulkRow());
  renderBulkForm();
}

function removeBulkRow(id) {
  if (bulkRows.length === 1) return;
  bulkRows = bulkRows.filter(r => r.id !== id);
  renderBulkForm();
}

function saveBulk() {
  const store = document.getElementById("b-store")?.value;
  const date  = document.getElementById("b-date")?.value || todayStr();
  if (!store || store === "__new__") return;
  const valid = bulkRows.filter(r => r.item.trim() && r.price && r.qty);
  if (!valid.length) return;

  const items   = getItems();
  const entries = getEntries();
  valid.forEach(r => {
    if (!items.includes(r.item.trim())) items.push(r.item.trim());
    entries.push({ id: Date.now() + Math.random(), item: r.item.trim(), cat: r.cat||"Uncategorized", price: parseFloat(r.price), qty: parseFloat(r.qty), unit: r.unit, store, date });
  });
  saveItems(items);
  saveEntries(entries);

  bulkRows = [newBulkRow(), newBulkRow(), newBulkRow()];
  renderBulkForm();
  const suc = document.getElementById("b-success");
  if (suc) { suc.textContent = `✅ ${valid.length} item${valid.length!==1?"s":""} saved!`; suc.style.display = "block"; setTimeout(() => { if(suc) suc.style.display = "none"; }, 3000); }
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const entries = getEntries();
  // Latest entry per item
  const latest = Object.values(entries.reduce((acc, e) => {
    if (!acc[e.item] || e.date > acc[e.item].date) acc[e.item] = e;
    return acc;
  }, {}));

  if (!latest.length) return `<div class="card"><p class="empty">No entries yet. Start adding transactions!</p></div>`;

  // Group by category
  const grouped = {};
  latest.forEach(e => {
    const cat = e.cat || "Uncategorized";
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(e);
  });

  // Sort categories: known order first, then alphabetical
  const catOrder = [...DEFAULT_CATEGORIES, "Uncategorized"];
  const sortedCats = Object.keys(grouped).sort((a,b) => {
    const ia = catOrder.indexOf(a), ib = catOrder.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });

  const totalItems = latest.length;
  const sections = sortedCats.map(cat => {
    const items = grouped[cat].sort((a,b) => a.item.localeCompare(b.item));
    const emoji = CAT_EMOJI[cat] || "🏷️";
    const rows = items.map(e => {
      const up = unitPrice(e.price, e.qty);
      return `<div class="cat-row">
        <div class="cat-row-name">${esc(e.item)}</div>
        <div class="cat-row-detail">
          <div>${e.qty} ${esc(e.unit)}</div>
          <div class="cat-row-store">🏪 ${esc(e.store)}</div>
          <div class="cat-row-store">📅 ${fmtDate(e.date)}</div>
        </div>
        <div class="cat-row-price">
          <div class="cat-row-unit-price">$${up.toFixed(2)}</div>
          <div class="cat-row-unit-label">per ${esc(e.unit)}</div>
          ${e.qty > 1 ? `<div class="cat-row-store">total $${e.price.toFixed(2)}</div>` : ""}
        </div>
      </div>`;
    }).join("");

    return `<div class="cat-section">
      <div class="cat-header">
        <span class="cat-header-emoji">${emoji}</span>
        <span>${esc(cat)}</span>
        <span class="cat-header-count">${items.length} item${items.length!==1?"s":""}</span>
      </div>
      <div class="cat-items">${rows}</div>
    </div>`;
  }).join("");

  return `<div class="card">
    <div class="dash-header">
      <span class="card-title" style="margin:0">Latest Unit Prices</span>
      <span class="sync-tag">📦 ${totalItems} items</span>
    </div>
    ${sections}
  </div>`;
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory() {
  const entries = [...getEntries()].reverse();
  if (!entries.length) return `<div class="card"><p class="empty">No entries yet.</p></div>`;

  const items = entries.map(e => {
    const up = unitPrice(e.price, e.qty);
    return `<div class="history-item">
      <div class="history-item-top">
        <div>
          <div class="history-item-name">${esc(e.item)}</div>
          <div class="history-item-unit">$${up.toFixed(2)} / ${esc(e.unit)}</div>
        </div>
        <div style="text-align:right">
          <div class="history-item-price">$${e.price.toFixed(2)}</div>
          <div style="font-size:11px;color:#9ca3af">total paid</div>
        </div>
      </div>
      <div class="history-item-bottom">
        <span class="history-pill">${e.qty} ${esc(e.unit)}</span>
        <span class="history-pill">🏪 ${esc(e.store)}</span>
        <span class="history-pill">📅 ${fmtDate(e.date)}</span>
      </div>
    </div>`;
  }).join("");

  return `<div class="card"><h2 class="card-title">Transaction History</h2><div class="history-list">${items}</div></div>`;
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function renderAdminUsers() {
  const users = getUsers().filter(u => u !== ADMIN);
  if (!users.length) return `<div class="card"><h2 class="card-title">Users</h2><p class="empty">No users yet.</p></div>`;
  const rows = users.map(u => {
    const ue = JSON.parse(localStorage.getItem(`gt_e_${u}`) || "[]");
    const total = ue.reduce((s,e) => s+e.price, 0);
    return `<div class="user-row">
      <div><div style="font-weight:700;text-transform:capitalize">${esc(u)}</div><div style="color:#6b7280;font-size:13px">${ue.length} transactions</div></div>
      <div style="color:#16a34a;font-weight:700">$${total.toFixed(2)}</div>
    </div>`;
  }).join("");
  return `<div class="card"><h2 class="card-title">Registered Users (${users.length})</h2>${rows}</div>`;
}

function renderAdminItems() {
  const items = getItems();
  const chips = items.map(i => `<div class="admin-chip">${esc(i)}<span class="chip-x" onclick="adminRemoveItem('${esc(i)}')">×</span></div>`).join("");
  return `<div class="card">
    <h2 class="card-title">Manage Item List</h2>
    <div class="add-item-row">
      <input class="field-input" id="new-item-input" placeholder="New item name…" autocomplete="off" onkeydown="if(event.key==='Enter')adminAddItem()" />
      <button class="btn-add-item" onclick="adminAddItem()">Add</button>
    </div>
    <div class="admin-item-grid">${chips}</div>
  </div>`;
}

function adminAddItem() {
  const val = document.getElementById("new-item-input").value.trim();
  if (!val) return;
  const items = getItems();
  if (!items.includes(val)) saveItems([...items, val]);
  switchTab("items");
}

function adminRemoveItem(item) {
  saveItems(getItems().filter(i => i !== item));
  switchTab("items");
}

function renderAdminAll() {
  const users   = getUsers().filter(u => u !== ADMIN);
  const all     = users.flatMap(u => (JSON.parse(localStorage.getItem(`gt_e_${u}`) || "[]")).map(e => ({...e,user:u})));
  all.sort((a,b) => b.date.localeCompare(a.date));
  if (!all.length) return `<div class="card"><h2 class="card-title">All Transactions</h2><p class="empty">No transactions yet.</p></div>`;
  const rows = all.map(e => `<tr>
    <td style="font-weight:600;color:#16a34a;text-transform:capitalize">${esc(e.user)}</td>
    <td>${fmtDate(e.date)}</td>
    <td>${esc(e.item)}</td>
    <td>${e.qty} ${esc(e.unit)}</td>
    <td><strong>$${unitPrice(e.price,e.qty).toFixed(2)}</strong>/${esc(e.unit)}</td>
    <td>$${e.price.toFixed(2)}</td>
    <td>${esc(e.store)}</td>
  </tr>`).join("");
  return `<div class="card">
    <h2 class="card-title">All Transactions (${all.length})</h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>User</th><th>Date</th><th>Item</th><th>Qty</th><th>Unit Price</th><th>Total</th><th>Store</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ── ADMIN CATEGORIES ──────────────────────────────────────────────────────────
function renderAdminCats() {
  const cats  = getCategories();
  const chips = cats.map(c => {
    const emoji = CAT_EMOJI[c] || "🏷️";
    return `<div class="admin-chip">${emoji} ${esc(c)}<span class="chip-x" onclick="adminRemoveCat('${esc(c)}')">×</span></div>`;
  }).join("");
  return `<div class="card">
    <h2 class="card-title">Manage Categories</h2>
    <p style="font-size:13px;color:#6b7280;margin-bottom:16px">Users pick a category when adding each item.</p>
    <div class="add-item-row">
      <input class="field-input" id="new-cat-input" placeholder="e.g. Beverages, Pet Food…" autocomplete="off"
        onkeydown="if(event.key==='Enter')adminAddCat()" />
      <button class="btn-add-item" onclick="adminAddCat()">Add</button>
    </div>
    <div class="admin-item-grid">${chips}</div>
  </div>`;
}

function adminAddCat() {
  const val = document.getElementById("new-cat-input").value.trim();
  if (!val) return;
  const cats = getCategories();
  if (!cats.includes(val)) saveCategories([...cats, val]);
  switchTab("cats");
}

function adminRemoveCat(cat) {
  saveCategories(getCategories().filter(c => c !== cat));
  switchTab("cats");
}

// ── STORE HELPERS (user-facing) ───────────────────────────────────────────────
function handleStoreChange(selectId, wrapId) {
  const val  = document.getElementById(selectId).value;
  const wrap = document.getElementById(wrapId);
  if (wrap) wrap.style.display = val === "__new__" ? "block" : "none";
}

function saveNewStore(selectId, inputId, wrapId) {
  const name = document.getElementById(inputId).value.trim();
  if (!name) return;
  const stores = getStores();
  if (!stores.includes(name)) saveStores([...stores, name]);
  // Rebuild select and pick new value
  const sel = document.getElementById(selectId);
  if (sel) {
    const opt = document.createElement("option");
    opt.value = name; opt.textContent = name;
    sel.insertBefore(opt, sel.lastElementChild); // before "Add new"
    sel.value = name;
  }
  document.getElementById(wrapId).style.display = "none";
  document.getElementById(inputId).value = "";
}

// ── ADMIN STORES ──────────────────────────────────────────────────────────────
function renderAdminStores() {
  const stores = getStores();
  const chips  = stores.map(s => `
    <div class="admin-chip">
      🏪 ${esc(s)}
      <span class="chip-x" onclick="adminRemoveStore('${esc(s)}')">×</span>
    </div>`).join("");
  return `<div class="card">
    <h2 class="card-title">Manage Store List</h2>
    <p style="font-size:13px;color:#6b7280;margin-bottom:16px">Add your local stores or remove ones you don't use.</p>
    <div class="add-item-row">
      <input class="field-input" id="new-store-input" placeholder="e.g. Sprouts, H-E-B, Lidl…" autocomplete="off"
        onkeydown="if(event.key==='Enter')adminAddStore()" />
      <button class="btn-add-item" onclick="adminAddStore()">Add</button>
    </div>
    <div class="admin-item-grid">${chips || '<p class="empty">No stores yet.</p>'}</div>
  </div>`;
}

function adminAddStore() {
  const val = document.getElementById("new-store-input").value.trim();
  if (!val) return;
  const stores = getStores();
  if (!stores.includes(val)) saveStores([...stores, val]);
  switchTab("stores");
}

function adminRemoveStore(store) {
  saveStores(getStores().filter(s => s !== store));
  switchTab("stores");
}

document.addEventListener("DOMContentLoaded", () => {
  const orig = renderAdd;
